<!doctype html>
<html>
  <head>
    <title>Lab Report Extractor</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f6f8;
        margin: 0;
        padding: 40px;
      }

      h2 {
        text-align: center;
        margin-bottom: 30px;
      }

      input[type="file"] {
        display: block;
        margin: 0 auto 15px auto;
      }

      button {
        display: block;
        margin: 0 auto 30px auto;
        padding: 10px 20px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
      }

      button:hover {
        background: #0056b3;
      }

      .container {
        display: flex;
        gap: 20px;
        justify-content: center;
        align-items: stretch;
      }

      .box {
        flex: 1;
        max-width: 320px;
        border: 1px solid #ddd;
        padding: 15px;
        border-radius: 10px;
        background: white;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        min-height: 220px;
      }

      .box h3 {
        margin-top: 0;
        border-bottom: 1px solid #eee;
        padding-bottom: 8px;
      }

      pre {
        white-space: pre-wrap;
        word-wrap: break-word;
        font-size: 13px;
      }
    </style>
  </head>

  <body>
    <h2>Lab Report Data Extractor</h2>

    <input type="file" id="fileInput" />
    <button onclick="upload()">Extract Data</button>

    <div class="container">
      <div class="box">
        <h3>Normal Data</h3>
        <pre id="normal"></pre>
      </div>

      <div class="box">
        <h3>Table Data</h3>
        <pre id="table"></pre>
      </div>

      <div class="box">
        <h3>Handwritten Data</h3>
        <pre id="handwritten"></pre>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
